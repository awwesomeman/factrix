name: docs

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'factrix/**'
      - 'scripts/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --python 3.12 --extra docs

      - name: Strict build
        run: uv run mkdocs build --strict

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --python 3.12 --extra docs

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          uv run mike deploy --push dev
          uv run mike set-default --push dev

      - name: Deploy release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          MINOR=$(echo "$TAG" | cut -d. -f1,2)
          uv run mike deploy --push --update-aliases "$TAG" "$MINOR" latest
          uv run mike set-default --push latest
