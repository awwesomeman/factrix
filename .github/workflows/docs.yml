name: docs

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'factrix/**/*.py'
      - '.github/workflows/docs.yml'
      - 'scripts/gen_metric_matrix.py'
      - 'scripts/sync_examples.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Strict build
        run: uv run mkdocs build --strict

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          uv run mike deploy --push dev
          # Bootstrap the root redirect on a fresh gh-pages: point to dev
          # until a release tag publishes 'latest' (which then claims the
          # default in the tag job below). Idempotent: once 'latest'
          # exists, this branch is skipped so we don't clobber it.
          if ! uv run mike list 2>/dev/null | awk '{print $1}' | grep -qx latest; then
            uv run mike set-default --push dev
          fi

      - name: Deploy release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          MINOR=$(echo "$TAG" | cut -d. -f1,2)
          uv run mike deploy --push --update-aliases "$TAG" "$MINOR" latest
          uv run mike set-default --push latest
