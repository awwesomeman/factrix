name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.x"
          enable-cache: true

      - name: Build wheel + sdist
        run: uv build --python 3.12

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    environment: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Fail if release already exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — refusing to overwrite" >&2
            exit 1
          fi

      - name: Extract CHANGELOG section
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          python3 - <<PYEOF
          import re, os, sys
          version = os.environ["VERSION"]
          with open("CHANGELOG.md") as f:
              content = f.read()
          pattern = rf"## \[{re.escape(version)}\].*?(?=\n## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          if not match:
              print(f"No CHANGELOG section found for {version}", file=sys.stderr)
              sys.exit(1)
          with open("/tmp/release_notes.md", "w") as f:
              f.write(match.group(0).strip())
          PYEOF
        env:
          VERSION: ${{ github.ref_name }}

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release_notes.md \
            dist/*
