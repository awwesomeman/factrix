name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.x"
          enable-cache: true

      - name: Build wheel + sdist
        run: uv build --python 3.12

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    environment: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    needs: [build, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract CHANGELOG section
        run: |
          python3 - <<'PYEOF'
          import re, os, sys
          tag = os.environ["GITHUB_REF_NAME"]          # e.g. "v0.8.0"
          version = tag.lstrip("v")                    # e.g. "0.8.0"
          with open("CHANGELOG.md") as f:
              content = f.read()
          # Matches "## v0.8.0 (2026-05-07)" style headings (no brackets, with date).
          pattern = rf"(?m)^## v{re.escape(version)} [^\n]+\n(.*?)(?=^## v[0-9]|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          if not match:
              print(f"No CHANGELOG section found for v{version}", file=sys.stderr)
              sys.exit(1)
          with open("/tmp/release_notes.md", "w") as f:
              f.write(match.group(1).strip())
          PYEOF

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" &>/dev/null; then
            gh release edit "$TAG" --title "$TAG" --notes-file /tmp/release_notes.md --latest
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release_notes.md \
              --latest \
              dist/*
          fi
