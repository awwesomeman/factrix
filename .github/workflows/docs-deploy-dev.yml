name: docs-deploy-dev

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'factrix/**'
      - 'scripts/**'
      - 'examples/**'
      - '.github/workflows/docs-deploy-dev.yml'
  # pull_request trigger temporarily disabled while the v0.14.0 rename
  # collapse (#466, #468, #460) lands ahead of the consolidated docs
  # sweep (#451). Restore once #451 merges and the doc surface is
  # back in sync with the new public API.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.x"
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --frozen --python 3.12 --extra docs

      - name: Strict build
        run: uv run mkdocs build --strict

      - name: Check generated docs files are committed
        run: |
          git diff --exit-code -- \
            docs/reference/_generated_metric_matrix.md \
            docs/development/_generated_registry_cells.md

  build-main:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.x"
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --frozen --python 3.12 --extra docs

      - name: Strict build
        run: uv run mkdocs build --strict

      - name: Check generated docs files are committed
        run: |
          git diff --exit-code -- \
            docs/reference/_generated_metric_matrix.md \
            docs/development/_generated_registry_cells.md
