name: docs-deploy-dev

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'factrix/**'
      - 'scripts/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'factrix/**'
      - 'scripts/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --python 3.12 --extra docs

      - name: Strict build
        run: uv run mkdocs build --strict

  build-main:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --python 3.12 --extra docs

      - name: Strict build
        run: uv run mkdocs build --strict
