name: docs-deploy-dev

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'factrix/**'
      - 'scripts/**'
      - 'examples/**'
      - '.github/workflows/docs-deploy-dev.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'factrix/**'
      - 'scripts/**'
      - 'examples/**'
      - '.github/workflows/docs-deploy-dev.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.x"
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --python 3.12 --extra docs

      - name: Strict build
        run: uv run mkdocs build --strict

      - name: Check generated docs files are committed
        run: |
          git diff --exit-code -- \
            docs/reference/_generated_metric_matrix.md \
            docs/development/_generated_registry_cells.md

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('.lycheeignore') }}
          restore-keys: lychee-${{ runner.os }}-

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-redirects 5
            --cache
            --max-cache-age 1d
            --exclude-loopback
            --base ./site
            './site/**/*.html'
            './README.md'
          fail: true

  build-main:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.x"
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --python 3.12 --extra docs

      - name: Strict build
        run: uv run mkdocs build --strict

      - name: Check generated docs files are committed
        run: |
          git diff --exit-code -- \
            docs/reference/_generated_metric_matrix.md \
            docs/development/_generated_registry_cells.md

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('.lycheeignore') }}
          restore-keys: lychee-${{ runner.os }}-

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          args: >-
            --no-progress
            --max-redirects 5
            --cache
            --max-cache-age 1d
            --exclude-loopback
            --base ./site
            './site/**/*.html'
            './README.md'
          fail: true
