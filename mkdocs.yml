site_name: factrix
site_description: Polars-native factor signal validation toolkit for quantitative finance
site_url: https://awwesomeman.github.io/factrix/
repo_url: https://github.com/awwesomeman/factrix
repo_name: awwesomeman/factrix
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/factrix_icon_light.png
  favicon: assets/factrix_icon_light.png
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

hooks:
  # factrix/metrics/*.py Matrix-row: -> docs/reference/_generated_metric_matrix.md
  - scripts/mkdocs_hooks/gen_metric_matrix.py
  # factrix/metrics/*.py Matrix-row: -> docs/reference/_generated_metric_name_index.md
  - scripts/mkdocs_hooks/gen_metric_name_index.py
  # factrix/_registry._DISPATCH_REGISTRY -> docs/development/_generated_registry_cells.md
  - scripts/mkdocs_hooks/gen_registry_cells.py
  # factrix/_registry._DISPATCH_REGISTRY -> docs/reference/_generated_evaluate_metric_table.md
  - scripts/mkdocs_hooks/gen_evaluate_metric_table.py
  # factrix/llms*.txt -> site root llms*.txt
  - scripts/mkdocs_hooks/sync_llms_txt.py

watch:
  - factrix
  - examples
  - scripts

plugins:
  - search:
      lang:
        - en
  - autorefs:
      resolve_closest: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: true
            show_root_toc_entry: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            heading_level: 1
  - mike:
      alias_type: symlink
      canonical_version: latest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/copy-strip-pycon.js

extra:
  version:
    provider: mike
    default: latest

validation:
  links:
    not_found: warn
    anchors: warn

exclude_docs: |
  plans/

# Hook-generated tables embedded into host pages via pymdownx.snippets
# (`--8<-- "docs/reference/_generated_*.md"`). They are not navigable
# as standalone pages — listing them in `not_in_nav` silences mkdocs'
# orphan-page INFO without breaking the embed.
not_in_nav: |
  **/_generated_*.md
  api/multi-horizon.md

nav:
  - Get started:
      - Home: index.md
      - Installation: getting-started/install.md
      - Quickstart: getting-started/quickstart.md
  - User guide:
      - Concepts:
          - Overview: getting-started/concepts.md
          - Where factrix fits: where-factrix-fits.md
          - Architecture: development/architecture.md
          - Statistical methods: reference/statistical-methods.md
          - Timeseries-mode conventions: reference/ts-mode-conventions.md
      - How-to:
          - Overview: guides/index.md
          - Decision tree: api/decision-tree.md
          - Information coefficient vs Fama-MacBeth: guides/choosing-metric.md
          - Panel vs timeseries: guides/panel-timeseries.md
          - Batch screening with Benjamini-Hochberg-Yekutieli: guides/batch-screening.md
          - Slice analysis: guides/slice-analysis.md
          - Standalone metrics: guides/standalone-metrics.md
      - Examples:
          - Overview: examples/index.md
          - Multi-factor screening: examples/multi_factor_screening.md
          - Stock factor evaluation: examples/stock_factor_evaluation.md
      - Reference tables:
          - Metrics applicability: reference/metric-applicability.md
          - Stat keys: reference/stat-keys-by-metric.md
          - Warning / info / stat codes: reference/warning-codes.md
          - Metrics pipelines: reference/metric-pipelines.md
          - Glossary: reference/glossary.md
          - Bibliography: reference/bibliography.md
  - API reference:
      - Overview: api/index.md
      - Panel schema: api/panel-schema.md
      - Entry points:
          - Core:
              - AnalysisConfig: api/analysis-config.md
              - evaluate: api/evaluate.md
              - run_metrics: api/run-metrics.md
          - Slicing:
              - by_slice: api/by-slice.md
              - slice_pairwise_test / slice_joint_test: api/slice-test.md
          - Multi-factor:
              - Overview: api/multi-factor.md
              - bhy: api/bhy.md
              - partial_conjunction: api/partial-conjunction.md
              - bhy_hierarchical: api/bhy-hierarchical.md
          - Discovery:
              - list_metrics: api/list-metrics.md
              - list_estimators: api/list-estimators.md
              - suggest_config: api/suggest-config.md
          - Diagnostics:
              - compare: api/compare.md
      - Results:
          - FactorProfile: api/factor-profile.md
          - MetricsBundle: api/metrics-bundle.md
          - MetricOutput: api/metric-output.md
          - Identity / context: api/identity.md
          - Errors: api/errors.md
      - Metrics:
          - Overview: api/metrics/index.md
          - Individual continuous:
              - Overview: api/metrics/individual-continuous.md
              - ic: api/metrics/ic.md
              - fama_macbeth: api/metrics/fama_macbeth.md
              - quantile: api/metrics/quantile.md
              - monotonicity: api/metrics/monotonicity.md
              - concentration: api/metrics/concentration.md
              - tradability: api/metrics/tradability.md
              - spanning: api/metrics/spanning.md
          - Individual sparse:
              - Overview: api/metrics/individual-sparse.md
              - caar: api/metrics/caar.md
              - event_quality: api/metrics/event_quality.md
              - event_horizon: api/metrics/event_horizon.md
              - mfe_mae: api/metrics/mfe_mae.md
              - clustering: api/metrics/clustering.md
              - corrado: api/metrics/corrado.md
          - Common continuous:
              - Overview: api/metrics/common-continuous.md
              - ts_beta: api/metrics/ts_beta.md
              - ts_quantile: api/metrics/ts_quantile.md
              - ts_asymmetry: api/metrics/ts_asymmetry.md
          - Series diagnostics:
              - Overview: api/metrics/series-tools.md
              - hit_rate: api/metrics/hit_rate.md
              - trend: api/metrics/trend.md
              - oos: api/metrics/oos.md
      - Supporting modules:
          - stats: api/stats.md
          - Estimator alternatives: api/estimator-alternatives.md
          - datasets: api/datasets.md
          - preprocess: api/preprocess.md
  - Development:
      - Design notes: development/design-notes.md
      - Contributing: development/contributing.md
  - Release notes: development/changelog.md
