site_name: factrix
site_description: Polars-native factor signal validation toolkit for quantitative finance
site_url: https://awwesomeman.github.io/factrix/
repo_url: https://github.com/awwesomeman/factrix
repo_name: awwesomeman/factrix
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

hooks:
  - scripts/gen_metric_matrix.py

plugins:
  - search:
      lang:
        - en
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
  - mkdocs-jupyter:
      execute: false
      include_source: false
      ignore_h1_titles: true
  - mike:
      alias_type: symlink
      canonical_version: latest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra:
  version:
    provider: mike
    default: latest

validation:
  links:
    not_found: warn
    anchors: warn

exclude_docs: |
  plans/
  plan_factorlib.md

nav:
  - Home: index.md
  - Reference:
      - Methodology: reference/methodology.md
      - Statistical methods: reference/statistical-methods.md
      - Metric applicability: reference/metric-applicability.md
      - Standalone metrics: reference/standalone-metrics.md
      - API:
          - AnalysisConfig: reference/api/analysis-config.md
          - evaluate: reference/api/evaluate.md
          - FactorProfile: reference/api/factor-profile.md
          - multi_factor: reference/api/multi-factor.md
          - datasets: reference/api/datasets.md
