site_name: factrix
site_description: Polars-native factor signal validation toolkit for quantitative finance
site_url: https://awwesomeman.github.io/factrix/
repo_url: https://github.com/awwesomeman/factrix
repo_name: awwesomeman/factrix
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

hooks:
  - scripts/gen_metric_matrix.py
  - scripts/sync_examples.py

plugins:
  - search:
      lang:
        - en
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
  - mkdocs-jupyter:
      execute: false
      include_source: false
      ignore_h1_titles: true
  - mike:
      alias_type: symlink
      canonical_version: latest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra:
  version:
    provider: mike
    default: latest

validation:
  links:
    not_found: warn
    anchors: warn

exclude_docs: |
  plans/
  plan_factorlib.md

nav:
  - Home: index.md
  - Get Started:
      - getting-started/index.md
      - Installation: getting-started/install.md
      - Quickstart: getting-started/quickstart.md
      - Concepts: getting-started/concepts.md
  - Guides:
      - guides/index.md
      - PANEL vs TIMESERIES: guides/panel-timeseries.md
      - Batch screening (BHY): guides/batch-screening.md
      - Choosing a metric: guides/choosing-metric.md
  - Reference:
      - Metric applicability: reference/metric-applicability.md
      - Standalone metrics: reference/standalone-metrics.md
      - Statistical methods: reference/statistical-methods.md
      - Bibliography: reference/bibliography.md
  - API:
      - AnalysisConfig: api/analysis-config.md
      - evaluate: api/evaluate.md
      - FactorProfile: api/factor-profile.md
      - multi_factor: api/multi-factor.md
      - datasets: api/datasets.md
      - Metrics:
          - api/metrics/index.md
          - Individual continuous:
              - ic: api/metrics/ic.md
              - fama_macbeth: api/metrics/fama_macbeth.md
              - quantile: api/metrics/quantile.md
              - monotonicity: api/metrics/monotonicity.md
              - concentration: api/metrics/concentration.md
              - tradability: api/metrics/tradability.md
              - spanning: api/metrics/spanning.md
          - Individual sparse:
              - caar: api/metrics/caar.md
              - event_quality: api/metrics/event_quality.md
              - event_horizon: api/metrics/event_horizon.md
              - mfe_mae: api/metrics/mfe_mae.md
              - clustering: api/metrics/clustering.md
              - corrado: api/metrics/corrado.md
          - Common continuous:
              - ts_beta: api/metrics/ts_beta.md
              - ts_quantile: api/metrics/ts_quantile.md
              - ts_asymmetry: api/metrics/ts_asymmetry.md
          - Series tools:
              - hit_rate: api/metrics/hit_rate.md
              - trend: api/metrics/trend.md
              - oos: api/metrics/oos.md
  - Examples:
      - examples/index.md
      - End-to-end walkthrough: examples/demo.ipynb
  - Development:
      - Architecture: development/architecture.md
      - Methodology: development/methodology.md
      - Contributing: development/contributing.md
      - Changelog: development/changelog.md
