site_name: factrix
site_description: Polars-native factor signal validation toolkit for quantitative finance
site_url: https://awwesomeman.github.io/factrix/
repo_url: https://github.com/awwesomeman/factrix
repo_name: awwesomeman/factrix
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/factrix_icon_light.png
  favicon: assets/factrix_icon_light.png
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

hooks:
  # examples/*.ipynb -> docs/examples/*.md
  - scripts/mkdocs_hooks/render_example_notebooks.py
  # factrix._metric_index.public_specs() -> docs/reference/_generated_metric_matrix.md
  - scripts/mkdocs_hooks/gen_metric_matrix.py
  # factrix._metric_index.public_specs() -> docs/reference/_generated_metric_name_index.md
  - scripts/mkdocs_hooks/gen_metric_name_index.py
  # factrix/_codes.{WarningCode,InfoCode,StatCode}.description ->
  # docs/reference/_generated_{warning,info,stat}_codes.md
  - scripts/mkdocs_hooks/gen_code_descriptions.py
  # factrix/llms*.txt -> site root llms*.txt
  - scripts/mkdocs_hooks/sync_llms_txt.py

watch:
  - factrix
  - examples
  - scripts

plugins:
  - search:
      lang:
        - en
  - autorefs:
      resolve_closest: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          inventories:
            - https://docs.pola.rs/api/python/stable/objects.inv
            - https://numpy.org/doc/stable/objects.inv
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: true
            show_root_toc_entry: true
            show_signature_annotations: true
            signature_crossrefs: true
            separate_signature: true
            merge_init_into_class: true
            heading_level: 1
  - mike:
      alias_type: symlink
      canonical_version: latest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/nav.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/copy-strip-pycon.js

extra:
  version:
    provider: mike
    default: latest

validation:
  links:
    not_found: warn
    anchors: warn

exclude_docs: |
  plans/

# Hook-generated tables embedded into host pages via pymdownx.snippets
# (`--8<-- "docs/reference/_generated_*.md"`). They are not navigable
# as standalone pages — listing them in `not_in_nav` silences mkdocs'
# orphan-page INFO without breaking the embed.
not_in_nav: |
  **/_generated_*.md

nav:
  - Get started:
      - Home: index.md
      - Installation: getting-started/install.md
      - Quickstart: getting-started/quickstart.md
  - User guide:
      - Concepts:
          - Overview: getting-started/concepts.md
          - Where factrix fits: where-factrix-fits.md
          - Statistical methods: reference/statistical-methods.md
          - Timeseries-mode conventions: reference/ts-mode-conventions.md
      - How-to:
          - Overview: guides/index.md
          - Preparing data: guides/preparing-data.md
          - Choosing a metric: guides/choosing-metric.md
          - Panel vs timeseries: guides/panel-timeseries.md
          - Reading results: guides/reading-results.md
          - Validating allocation signals: guides/validating-allocation-signals.md
          - Observability: guides/observability.md
          - Large-scale evaluation: guides/large-scale-evaluation.md
          - Slice analysis: guides/slice-analysis.md
          - Standalone metrics: guides/standalone-metrics.md
          - Custom metrics: guides/custom-metrics.md
      - Examples:
          - Overview: examples/index.md
          - Multi-factor screening: examples/multi_factor_screening.md
          - Stock factor evaluation: examples/stock_factor_evaluation.md
      - Reference tables:
          - Glossary: reference/glossary.md
          - Metrics applicability: reference/metric-applicability.md
          - Stat keys: reference/stat-keys-by-metric.md
          - Warning codes: reference/warning-codes.md
          - Metrics pipelines: reference/metric-pipelines.md
          - Bibliography: reference/bibliography.md
  - API reference:
      - Overview: api/index.md
      - Data schema: api/data-schema.md
      - Entry points:
          - Core:
              - evaluate: api/evaluate.md
              - evaluate_horizons: api/multi-horizon.md
              - inspect_data: api/inspect-data.md
          - Slicing:
              - by_slice: api/by-slice.md
              - slice_pairwise_test / slice_joint_test: api/slice-test.md
          - Multi-factor:
              - Overview: api/multi-factor.md
              - bhy: api/bhy.md
              - bhy_across_metrics: api/bhy-across-metrics.md
              - partial_conjunction: api/partial-conjunction.md
              - partial_conjunction_across_metrics: api/partial-conjunction-across-metrics.md
              - bhy_hierarchical: api/bhy-hierarchical.md
          - Discovery:
              - metric_spec: api/metric-spec.md
          - Diagnostics:
              - compare: api/compare.md
      - Results:
          - EvaluationResult: api/evaluation-results.md
          - Errors: api/errors.md
      - Metrics:
          - Overview: api/metrics/index.md
          - Individual continuous:
              - Overview: api/metrics/individual-continuous.md
              - ic: api/metrics/ic.md
              - fama_macbeth: api/metrics/fm_beta.md
              - quantile: api/metrics/quantile.md
              - k_spread: api/metrics/k_spread.md
              - monotonicity: api/metrics/monotonicity.md
              - concentration: api/metrics/concentration.md
              - tradability: api/metrics/tradability.md
              - spanning: api/metrics/spanning.md
          - Individual sparse:
              - Overview: api/metrics/individual-sparse.md
              - caar: api/metrics/caar.md
              - event_quality: api/metrics/event_quality.md
              - event_horizon: api/metrics/event_horizon.md
              - mfe_mae: api/metrics/mfe_mae.md
              - clustering: api/metrics/clustering_hhi.md
              - corrado: api/metrics/corrado_rank.md
          - Common sparse:
              - Overview: api/metrics/common-sparse.md
          - Common continuous:
              - Overview: api/metrics/common-continuous.md
              - common_beta: api/metrics/common_beta.md
              - common_quantile: api/metrics/common_quantile.md
              - common_asymmetry: api/metrics/common_asymmetry.md
          - Series diagnostics:
              - Overview: api/metrics/series-tools.md
              - positive_rate: api/metrics/positive_rate.md
              - directional_hit_rate: api/metrics/directional_hit_rate.md
              - directional_pair_accuracy: api/metrics/directional_pair_accuracy.md
              - predictive_beta: api/metrics/predictive_beta.md
              - trend: api/metrics/trend.md
              - oos: api/metrics/oos_decay.md
      - Supporting modules:
          - stats: api/stats.md
          - datasets: api/datasets.md
          - preprocess: api/preprocess.md
  - Development:
      - Architecture: development/architecture.md
      - Design notes: development/design-notes.md
      - Contributing: development/contributing.md
  - Release notes:
      - Changelog: development/changelog.md
