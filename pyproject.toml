[project]
name = "factrix"
version = "0.4.0"
description = "Quantitative factor evaluation framework for AI-driven factor mining"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.12"
dependencies = [
    "polars>=1.38",
    "numpy>=2.0",
    "scipy>=1.13",
    "pandera>=0.29",
]

[project.optional-dependencies]
charts = ["plotly>=6.0"]
mlflow = ["mlflow>=3.10"]
jupyter = [
    "jupyter>=1.0.0",
    "jupyterlab>=3.4.0",
    "ipywidgets>=7.7.0",
    "nbformat>=4.2.0",
]
dev = [
    "pytest==8.3.3",
    "pytest-cov==6.1.1",
    "pytest-mock==3.14.0",
    "pre-commit>=4.5.1",
    "ruff>=0.14.10",
    "commitizen>=4.10.1",
    "mypy>=1.0.0",
    "build",
    "twine",
]
all = ["factrix[charts,mlflow,jupyter]"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.setuptools.packages.find]
include = ["factrix*"]
namespaces = false

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.4.0"
tag_format = "v$version"
bump_message = "chore(release): v$new_version"
changelog_incremental = true
major_version_zero = true
version_files = [
    "pyproject.toml:version",
    "factrix/__init__.py:__version__"
]

