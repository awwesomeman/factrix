[project]
name = "factorlib"
version = "0.1.0"
description = "Quantitative factor evaluation framework for AI-driven factor mining"
requires-python = ">=3.12"
dependencies = [
    "polars>=1.38",
    "numpy>=2.0",
    "pandera>=0.29",
    "mlflow>=3.10",
    "streamlit>=1.55",
    "plotly>=6.0",
    "watchdog==6.0.0",
    "nbformat>=4.2.0",
]

[project.scripts]
factor-lab = "factorlib.integrations.streamlit.app:main"

[project.optional-dependencies]
dev = ["pytest>=9.0", "pytest-cov>=7.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.setuptools.packages.find]
include = ["factorlib*"]
namespaces = false

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "nbconvert>=7.17.1",
]
