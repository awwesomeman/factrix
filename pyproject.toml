[project]
name = "factorlib"
version = "0.1.0"
description = "Quantitative factor evaluation framework for AI-driven factor mining"
requires-python = ">=3.12"
dependencies = [
    "polars>=1.38",
    "numpy>=2.0",
    "pandera>=0.29",
]

[project.optional-dependencies]
charts = ["plotly>=6.0"]
mlflow = ["mlflow>=3.10"]
all = ["plotly>=6.0", "mlflow>=3.10"]
dev = [
    "pytest>=9.0",
    "pytest-cov>=7.0",
    "nbformat>=4.2.0",
    "nbconvert>=7.17.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.setuptools.packages.find]
include = ["factorlib*"]
namespaces = false

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"
